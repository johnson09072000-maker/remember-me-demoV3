<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REMEMBERME - 寵物數位分身 24H 作息 Demo</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000;
        }

        /* 滿版背景，用來載入不同時段的溫馨環境氛圍圖 */
        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: background-image 1.2s ease-in-out; /* 讓背景切換時有漸變的溫暖視覺感 */
        }

        /* 疊加一層淡淡的遮罩，提升 3D 模型的立體感與文字識別度 */
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Model Viewer 疊加在背景上方 */
        model-viewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            --poster-color: transparent;
        }

        /* 上方的狀態顯示看板 (情感共鳴的核心) */
        .status-card {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            background: rgba(255, 255, 255, 0.9);
            padding: 18px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            pointer-events: none;
            width: 85%;
            max-width: 420px;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .status-card h2 { 
            margin: 0; 
            font-size: 1.25rem; 
            color: #2c3e50; 
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .status-card p { 
            margin: 8px 0 0 0; 
            font-size: 0.9rem; 
            color: #555; 
            line-height: 1.4;
            font-weight: 400;
        }

        /* 下方提案演示專用的控制台 */
        .control-panel {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            background: rgba(20, 20, 20, 0.8);
            padding: 20px;
            border-radius: 24px;
            width: 85%;
            max-width: 480px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }

        .slider-label {
            margin-bottom: 12px;
            font-size: 0.95rem;
            letter-spacing: 1px;
            font-weight: 500;
        }
        
        .slider-label strong {
            color: #ffb84d;
            font-size: 1.1rem;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ffb84d;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(255,184,77,0.6);
            transition: transform 0.15s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }
    </style>
</head>
<body>

    <div id="bgContainer" class="background-container"></div>
    <div class="background-overlay"></div>

    <div class="status-card">
        <h2 id="timeTitle">同步中...</h2>
        <p id="behaviorDesc">正在感應寵物的生活作息軌跡...</p>
    </div>

    <model-viewer 
        id="petModel"
        src="https://johnson09072000-maker.github.io/remember-me-demo/fox.glb" 
        camera-controls
        auto-rotate
        rotation="0deg 0deg 0deg"
        camera-orbit="0deg 75deg 3.5m"
        shadow-intensity="12"
        shadow-softness="0.8"
        environment-image="legacy"
        exposure="1"
        autoplay>
    </model-viewer>

    <div class="control-panel">
        <div class="slider-container">
            <span class="slider-label">⏳ 簡報展示時空軸：<strong id="sliderTimeDisplay">00:00</strong></span>
            <input type="range" id="timeSlider" min="0" max="23" value="12">
        </div>
    </div>
